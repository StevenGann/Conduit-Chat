<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conduit Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="login-screen" class="screen">
      <h1>Conduit Chat</h1>
      <form id="login-form">
        <input type="text" id="login-username" placeholder="Username" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Log in</button>
      </form>
      <p id="login-error" class="error"></p>
    </div>

    <div id="change-password-modal" class="modal" style="display:none">
      <div class="modal-content">
        <h2>Change Password</h2>
        <p class="nag-text">Please change your password from the default.</p>
        <form id="change-password-form">
          <input type="password" id="current-password" placeholder="Current password" required>
          <input type="password" id="new-password" placeholder="New password" required>
          <input type="password" id="confirm-password" placeholder="Confirm new password" required>
          <div class="modal-buttons">
            <button type="button" id="dismiss-password">Dismiss</button>
            <button type="submit">Change</button>
          </div>
        </form>
      </div>
    </div>

    <div id="chat-screen" class="screen" style="display:none">
      <header>
        <span id="user-display"></span>
        <button id="logout-btn">Log out</button>
      </header>
      <div class="chat-layout">
        <aside id="sidebar">
          <h3>DMs</h3>
          <ul id="dm-list"></ul>
          <h3>Rooms</h3>
          <ul id="room-list"></ul>
          <div class="new-chat">
            <input type="text" id="new-dm-user" placeholder="Username for DM">
            <button id="start-dm">Start DM</button>
            <input type="text" id="new-room-name" placeholder="Room name">
            <button id="create-room">Create room</button>
          </div>
        </aside>
        <main id="chat-main">
          <div id="no-conversation" class="placeholder">
            <p>Select a conversation or start a new one</p>
          </div>
          <div id="conversation" style="display:none">
            <div id="messages"></div>
            <form id="send-form">
              <input type="text" id="message-input" placeholder="Message..." autocomplete="off">
              <button type="submit">Send</button>
            </form>
          </div>
        </main>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
