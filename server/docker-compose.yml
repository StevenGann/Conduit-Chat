services:
  conduit:
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_PATH=/app/data/conduit.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEFAULT_PASSWORD=${DEFAULT_PASSWORD:-changeme}
      - SERVE_WEB_APP=true
      - WEB_APP_PATH=/app/static
    volumes:
      - conduit-data:/app/data

volumes:
  conduit-data:
